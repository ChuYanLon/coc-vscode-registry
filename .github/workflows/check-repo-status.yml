name: Check Repo Status

on:
  schedule:
    - cron: '0 0 * * 0'  # weekly Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install tsx
        run: npm install -g tsx

      - name: Check repo status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/check-repo-status.ts

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain repo-status.json)" ]]; then
            echo "No changes"
            exit 0
          fi
          BRANCH="chore/repo-status-$(date +%s)"
          git config user.name 'coc-vscode-loader[bot]'
          git config user.email 'bot@coc-vscode-loader'
          git checkout -b "$BRANCH"
          git add repo-status.json
          git commit -m 'chore: update repo status (archived/lastUpdated)'
          git push origin "$BRANCH"
          gh pr create \
            --title 'chore: update repo status' \
            --body 'Automated update of repo-status.json (archived/lastUpdated fields).' \
            --base main \
            --head "$BRANCH"
          gh pr merge --squash --delete-branch "$BRANCH"
