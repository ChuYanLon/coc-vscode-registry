name: Check Repo Status

on:
  schedule:
    - cron: '0 0 * * *'  # daily 00:00 UTC
  workflow_dispatch:

concurrency:
  group: check-repo-status
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install tsx
        run: npm install -g tsx

      - name: Check and update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run check script and capture output
          OUTPUT=$(npx tsx scripts/check-repo-status.ts 2>&1)
          echo "$OUTPUT"

          # Detect archived repos
          ARCHIVED_LINE=$(echo "$OUTPUT" | grep '^ARCHIVED_REPOS:' | sed 's/^ARCHIVED_REPOS://')

          if [[ -z "$(git status --porcelain repo-status.json)" ]]; then
            echo "No changes"
            exit 0
          fi

          # Create PR with changes
          BRANCH="chore/repo-status-$(date +%s)"
          git config user.name 'coc-vscode-loader[bot]'
          git config user.email 'bot@coc-vscode-loader'
          git checkout -b "$BRANCH"
          git add repo-status.json
          git commit -m 'chore: update repo status (archived/lastUpdated)'
          git push origin "$BRANCH"
          gh pr create \
            --title 'chore: update repo status' \
            --body 'Automated update of repo-status.json (archived/lastUpdated fields).' \
            --base main \
            --head "$BRANCH"
          gh pr merge --squash --delete-branch "$BRANCH"

          # Create/update issue listing all archived repos
          if [[ -n "$ARCHIVED_LINE" ]]; then
            BODY="# Archived Repositories\n\nThe following registry entries point to archived repositories:\n"
            while IFS='|' read -ra ENTRIES; do
              for entry in "${ENTRIES[@]}"; do
                name="${entry%%:*}"
                repo="${entry#*:}"
                BODY="${BODY}\n- **${name}** (\`${repo}\`)"
              done
            done <<< "$ARCHIVED_LINE"
            BODY="${BODY}\n\nAction needed: consider updating or removing these registry entries."
            BODY="${BODY//\\n/$'\n'}"
            EXISTING=$(gh issue list --label archived --state open --json number -q '.[0].number' 2>/dev/null || echo "")
            if [[ -n "$EXISTING" ]]; then
              gh issue update "$EXISTING" --body "$BODY"
              echo "Updated issue #$EXISTING"
            else
              gh issue create \
                --title "archived repositories detected" \
                --body "$BODY" \
                --label archived \
                --type Task
            fi
          fi
