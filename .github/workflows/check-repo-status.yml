name: Check Repo Status

on:
  schedule:
    - cron: '0 0 * * 0'  # weekly Sunday 00:00 UTC
  workflow_dispatch:

concurrency:
  group: check-repo-status
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install tsx
        run: npm install -g tsx

      - name: Check and update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run check script and capture output
          OUTPUT=$(npx tsx scripts/check-repo-status.ts 2>&1)
          echo "$OUTPUT"

          # Detect newly archived repos
          NEWLY_ARCHIVED=$(echo "$OUTPUT" | grep '^NEWLY_ARCHIVED:' | sed 's/^NEWLY_ARCHIVED://')

          if [[ -z "$(git status --porcelain repo-status.json)" ]]; then
            echo "No changes"
            exit 0
          fi

          # Create PR with changes
          BRANCH="chore/repo-status-$(date +%s)"
          git config user.name 'coc-vscode-loader[bot]'
          git config user.email 'bot@coc-vscode-loader'
          git checkout -b "$BRANCH"
          git add repo-status.json
          git commit -m 'chore: update repo status (archived/lastUpdated)'
          git push origin "$BRANCH"
          gh pr create \
            --title 'chore: update repo status' \
            --body 'Automated update of repo-status.json (archived/lastUpdated fields).' \
            --base main \
            --head "$BRANCH"
          gh pr merge --squash --delete-branch "$BRANCH"

          # Create issue for newly archived repos (skip if one is already open)
          if [[ -n "$NEWLY_ARCHIVED" ]]; then
            EXISTING=$(gh issue list --label archived --state open --json number -q 'length' 2>/dev/null || echo 0)
            if [[ "$EXISTING" -eq 0 ]]; then
              BODY="# Archived Repositories Detected\n\nThe following repositories have been archived:\n"
              IFS=',' read -ra NAMES <<< "$NEWLY_ARCHIVED"
              for name in "${NAMES[@]}"; do
                repo=$(echo "$OUTPUT" | grep "$name" | awk '{print $NF}')
                BODY="${BODY}\n- **${name}** (\`${repo}\`)"
              done
              BODY="${BODY}\n\nAction needed: consider updating or removing the registry entries for these packages."
              gh issue create \
                --title "archived repositories detected" \
                --body "$BODY" \
                --label archived \
                --type Task
            else
              echo "Open issue already exists, skipping"
            fi
          fi
